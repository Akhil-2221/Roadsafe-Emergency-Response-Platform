version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: roadsafe-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: roadsafe
      POSTGRES_USER: roadsafe
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadsafe"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: roadsafe-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: ../../infra/docker/api.prod.Dockerfile
    container_name: roadsafe-api-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://roadsafe:${DB_PASSWORD}@postgres:5432/roadsafe
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      QR_JWT_SECRET: ${QR_JWT_SECRET}
      BCRYPT_ROUNDS: "12"
      COOKIE_SECRET: ${COOKIE_SECRET}
      ALLOWED_ORIGINS: ${APP_URL}
      APP_URL: ${APP_URL}
      AI_SERVICE_URL: http://ai:8000
      AI_SERVICE_KEY: ${AI_SERVICE_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      FIREBASE_SERVER_KEY: ${FIREBASE_SERVER_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  ai:
    build:
      context: ./services/ai
      dockerfile: ../../infra/docker/ai.prod.Dockerfile
    container_name: roadsafe-ai-prod
    restart: always
    environment:
      ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_SERVICE_KEY: ${AI_SERVICE_KEY}
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  web:
    build:
      context: ./apps/web
      dockerfile: ../../infra/docker/web.prod.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_API_KEY}
    container_name: roadsafe-web-prod
    restart: always
    networks:
      - internal
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.25-alpine
    container_name: roadsafe-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
      - external
    depends_on:
      - api
      - web
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
